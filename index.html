<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Defensa Alienígena</title>

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: #050b07;
      color: #00ff88;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .btn {
      background: black;
      color: #00ff88;
      border: 1px solid #00ff88;
      padding: 12px 25px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #00ff88;
      color: black;
    }

    table {
      margin: auto;
      width: 90%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #00ff8844;
      padding: 10px;
    }

    th {
      background: #001a10;
    }

    .hostil {
      color: red;
      font-weight: bold;
    }

    .seguro {
      color: #00ff88;
    }

    #alerta {
      display: none;
      color: red;
      font-size: 20px;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

<h1>🛸 SISTEMA DE DEFENSA ALIENÍGENA</h1>

<button class="btn" onclick="cargarSenales()">
  📡 ESCANEAR ESPACIO
</button>

<p id="estado"></p>
<p id="estadisticas"></p>
<p id="alerta">⚠️ ACTIVIDAD HOSTIL DETECTADA</p>

<table>
  <thead>
    <tr>
      <th>Señal</th>
      <th>Velocidad</th>
      <th>Distancia</th>
      <th>Estado</th>
    </tr>
  </thead>
  <tbody id="datos"></tbody>
</table>

<script>

async function cargarSenales() {

  const estado = document.getElementById("estado");
  const stats = document.getElementById("estadisticas");
  const alerta = document.getElementById("alerta");
  const tabla = document.getElementById("datos");

  estado.innerText = "📡 Escaneando el espacio...";

  try {
    const res = await fetch(
  "https://api.nasa.gov/neo/rest/v1/feed?api_key=IoadGEecOXg1qQ4QgGsJndWSIAIfQg42rRjfjaPe"
);
   const json = await res.json();

  const objetos = Object.values(json.near_earth_objects).flat();

  tabla.innerHTML = "";

  let hostiles = 0;
  let seguros = 0;

  objetos.forEach(obj => {

    const velocidad = obj.close_approach_data[0].relative_velocity.kilometers_per_hour;
    const distancia = obj.close_approach_data[0].miss_distance.kilometers;
    const hostil = obj.is_potentially_hazardous_asteroid;

    if (hostil) hostiles++;
    else seguros++;

    tabla.innerHTML += `
      <tr>
        <td>👽 ${obj.name}</td>
        <td>${Number(velocidad).toLocaleString()} km/h</td>
        <td>${Number(distancia).toLocaleString()} km</td>
        <td class="${hostil ? 'hostil' : 'seguro'}">
          ${hostil ? 'HOSTIL' : 'SEGURO'}
        </td>
      </tr>
    `;
  });

    stats.innerText = `HOSTILES: ${hostiles} | SEGUROS: ${seguros}`;

    alerta.style.display = hostiles > 0 ? "block" : "none";

    estado.innerText = "✔ Escaneo completado";

  } catch (err) {
    console.log(err);
    estado.innerText = "❌ Error de conexión con el sistema";
  }
}

</script>

</body>
</html>
